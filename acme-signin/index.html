<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in to Rama Store</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Advanced Animated Background Canvas & Grid -->
  <canvas id="pixel-stars-canvas"></canvas>
  <div class="grid-overlay"></div>

  <!-- Toast Notification System -->
  <div id="toast-container" class="toast-container"></div>

  <div class="page-wrapper">
    <div class="signin-container">
      
      <!-- Generated RAMA Store Logo Section -->
      <div class="logo-row">
        <img src="rama_store_logo.jpg" alt="RAMA Store Logo" class="rama-logo-img">
        <span class="logo-text">RAMA <span class="logo-text-muted">Store</span></span>
      </div>

      <!-- Headers -->
      <h1 class="signin-title">Sign in to your account</h1>
      <p class="signin-address" style="font-size: 11px; color: #E8A33D; text-align: center; margin-bottom: 4px; font-weight: 600; letter-spacing: 0.3px;">Samaur Bazar, Fazilnagar Road 274401</p>
      <p class="signin-subtitle">Don't have an account? <a href="#" id="link-signup" class="bold-link">Sign up</a></p>

      <!-- Social Logins Row -->
      <div class="social-row">
        <!-- GitHub Button -->
        <button class="btn-social" id="btn-github">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 4.42 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.34-3.369-1.34-.454-1.156-1.11-1.464-1.11-1.464-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.137 20.162 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
          </svg>
          <span>Login with GitHub</span>
        </button>

        <!-- Google Button -->
        <button class="btn-social" id="btn-google">
          <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.136 4.114-3.472 0-6.29-2.818-6.29-6.29 0-3.472 2.818-6.29 6.29-6.29 1.564 0 2.978.58 4.062 1.536l3.208-3.208C19.344 2.466 15.96 1 12 1 5.925 1 1 5.925 1 12s4.925 11 11 11c6.26 0 10.4-4.4 10.4-10.6 0-.712-.082-1.396-.2-2.115H12.24z"/>
          </svg>
          <span>Login with Google</span>
        </button>
      </div>

      <!-- Divider -->
      <div class="divider-row">
        <span class="line"></span>
        <span class="text">OR</span>
        <span class="line"></span>
      </div>

      <!-- Input Form -->
      <form id="signin-form" class="form-stack">
        <!-- Email Input -->
        <div class="input-group">
          <label for="input-email">Email</label>
          <input type="email" id="input-email" placeholder="ephraim@blocks.so" required>
          <span class="error-msg" id="error-email"></span>
        </div>

        <!-- Password Input -->
        <div class="input-group">
          <label for="input-password">Password</label>
          <input type="password" id="input-password" placeholder="********" required>
          <span class="error-msg" id="error-password"></span>
        </div>

        <!-- Action Button -->
        <button type="submit" class="btn-signin">Sign in</button>
      </form>

      <!-- Footer Reset link -->
      <div class="footer-row">
        <span>Forgot your password?</span>
        <a href="#" id="link-reset" class="bold-link">Reset password</a>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
